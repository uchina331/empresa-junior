<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Publicações | Empresa Júnior</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.btn-voltar{
    display:inline-block;
    margin:25px;
    padding:12px 22px;
    background:#021B4E;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.btn-voltar:hover{
    background:#FFD54F;
    color:#021B4E;
    transform:translateY(-3px);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3f8;
}


header{
background:#002b5c;
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:34px;
}

header p{
margin-top:8px;
opacity:.9;
}


.barra{
width:90%;
max-width:900px;
margin:30px auto;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.barra input{

width:420px;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
}

.barra select{

padding:14px;
border:none;
border-radius:8px;
font-size:16px;
}


.container{

width:90%;
max-width:1300px;
margin:auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:25px;

padding-bottom:50px;

}


.card{

background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.12);

transition:.4s;

}

.card:hover{

transform:translateY(-8px);

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}


.conteudo{

padding:20px;

}


.categoria{

display:inline-block;

background:#005bbb;
color:white;

padding:5px 12px;
border-radius:30px;

font-size:13px;
margin-bottom:12px;

}


.conteudo h2{

font-size:22px;
color:#002b5c;
margin-bottom:10px;

}


.data{

color:gray;
font-size:14px;
margin-bottom:15px;

}


.texto{

line-height:1.7;
color:#555;
margin-bottom:20px;

}


button{

background:#005bbb;
color:white;

padding:12px 20px;

border:none;
border-radius:8px;

cursor:pointer;

transition:.3s;

}


button:hover{

background:#003f82;

}


footer{

background:#002b5c;

color:white;

padding:25px;

text-align:center;

margin-top:40px;

}

</style>
</head>
<body>

<header>

<a href="index.html" class="btn-voltar">
⬅ Voltar ao Site Principal
</a>

<h1>📰 Publicações</h1>

<p>Empresa Júnior - CETEP Medeiros Neto</p>
<div style="position:absolute;top:20px;right:20px;">
    <button id="btnLogin" onclick="abrirLogin()">
        🔐 Login Admin
    </button>

    <button id="btnSair" onclick="logout()" style="display:none;">
        🚪 Sair
    </button>
</div>
</header>


<div style="text-align:center;margin:25px 0;">

<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBs1WWlYtYGC18f6QyNJ2h4L-2d9xaHH3g",

authDomain: "empresa-junior-cetep.firebaseapp.com",

projectId: "empresa-junior-cetep",

storageBucket: "empresa-junior-cetep.firebasestorage.app",

messagingSenderId: "62973063152",

appId: "1:62973063152:web:bcea0e3d97d616fccf7735"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);

window.abrirLogin = function () {
    document.getElementById("loginAdmin").style.display = "flex";
}

window.fecharLogin = function () {
    document.getElementById("loginAdmin").style.display = "none";
}

window.loginAdmin = async function () {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    try {

        await signInWithEmailAndPassword(auth, email, senha);

        alert("Login realizado com sucesso!");

        fecharLogin();

    } catch (e) {

        alert("E-mail ou senha incorretos.");

    }

}

window.logout = async function () {

    await signOut(auth);

}

onAuthStateChanged(auth, (user) => {

    const btnLogin = document.getElementById("btnLogin");
    const btnSair = document.getElementById("btnSair");

    if(user){

        btnLogin.style.display = "none";
        btnSair.style.display = "inline-block";

       document.getElementById("btnAdicionar").style.display = "inline-block";

        document.querySelectorAll("[data-admin]").forEach(botao=>{
            botao.style.display = "inline-block";
        });

    }else{

        btnLogin.style.display = "inline-block";
        btnSair.style.display = "none";

       document.getElementById("btnAdicionar").style.display = "none";

        document.querySelectorAll("[data-admin]").forEach(botao=>{
            botao.style.display = "none";
        });

    }

});

window.abrirFormulario = function(){

const formulario = document.getElementById("formulario");


if(formulario.style.display === "block"){

formulario.style.display = "none";

}else{

formulario.style.display = "block";

}

}


async function enviarImagemCloudinary(arquivo){

    const formData = new FormData();

    formData.append("file", arquivo);
    formData.append("upload_preset", "empresa-junior");

    const resposta = await fetch(
        "https://api.cloudinary.com/v1_1/akly4e4z/image/upload",
        {
            method: "POST",
            body: formData
        }
    );

    const dados = await resposta.json();

    return dados.secure_url;
}

window.publicarNoticia = async function(){


const titulo = document.getElementById("titulo").value;

const texto = document.getElementById("texto").value;

const imagem = document.getElementById("imagem");


if(titulo.trim()==="" || texto.trim()===""){

alert("Preencha título e notícia!");

return;

}



try{

let imagemURL = "sem-imagem";

if(imagem.files.length > 0){

    imagemURL = await enviarImagemCloudinary(imagem.files[0]);

}

await addDoc(collection(db,"noticias"),{

    titulo: titulo,
    texto: texto,
    imagem: imagemURL,
    data: serverTimestamp()

});



alert("Notícia salva no Firebase!");



document.getElementById("titulo").value="";

document.getElementById("texto").value="";



document.getElementById("formulario").style.display = "none";

carregarNoticias();



}catch(error){

console.log(error);

alert("Erro ao salvar notícia");
}
}
window.apagarNoticia = async function(id){ const confirmar = confirm("Deseja apagar essa notícia?");if(confirmar){
await deleteDoc(doc(db,"noticias",id));
alert("Notícia apagada!");
carregarNoticias();
}
}
async function carregarNoticias(){


const lista = document.getElementById("listaNoticias");


lista.innerHTML="";


const consulta = await getDocs(collection(db,"noticias"));



consulta.forEach((doc)=>{


const noticia = doc.data();



const card = document.createElement("div");

card.className="card";

card.innerHTML=`

${noticia.imagem && noticia.imagem !== "sem-imagem" ? 
`
<img src="${noticia.imagem}" alt="Imagem da notícia">
`
:
`
<img src="https://via.placeholder.com/600x350?text=Sem+Imagem">
`
}


<div class="conteudo">

<span class="categoria">
Notícia
</span>


<h2>
${noticia.titulo}
</h2>


<p class="texto">
${noticia.texto}
</p>


<button data-admin style="display:none;" onclick="apagarNoticia('${doc.id}')">
🗑️ Apagar
</button>


</div>

`;

lista.appendChild(card);



});


}



carregarNoticias();


</script>
<div style="text-align:center;margin:25px 0;">

<button
onclick="abrirFormulario()"
id="btnAdicionar"
style="display:none;">
➕ Adicionar Notícia
</button>

</div>


<div id="formulario" style="display:none; max-width:700px; margin:20px auto; background:#fff; padding:20px; border-radius:10px;">

<input 
type="text" 
id="titulo" 
placeholder="Título da notícia"
style="width:100%;padding:10px;"
>

<br><br>


<textarea 
id="texto"
rows="6"
placeholder="Escreva a notícia..."
style="width:100%;padding:10px;"
></textarea>


<br><br>

<input type="file" id="imagem" accept="image/*">


<button onclick="publicarNoticia()">
Publicar
</button>


</div>
<div id="listaNoticias" class="container"></div>

<div id="loginAdmin" style="display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;">

<div style="background:white;
padding:30px;
border-radius:15px;
width:350px;">

<h2>Administrador</h2>

<br>

<input
id="email"
type="email"
placeholder="E-mail"
style="width:100%;padding:10px;">

<br><br>

<input
id="senha"
type="password"
placeholder="Senha"
style="width:100%;padding:10px;">

<br><br>

<button onclick="loginAdmin()">
Entrar
</button>

<button onclick="fecharLogin()">
Cancelar
</button>

</div>

</div>

<footer>

Empresa Júnior © 2026

</footer>

</body>
</html>
