<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Publicações | Empresa Júnior</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

.btn-voltar{
    display:inline-block;
    margin:25px;
    padding:12px 22px;
    background:#021B4E;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.btn-voltar:hover{
    background:#FFD54F;
    color:#021B4E;
    transform:translateY(-3px);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3f8;
}


header{
background:#002b5c;
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:34px;
}

header p{
margin-top:8px;
opacity:.9;
}


.barra{
width:90%;
max-width:900px;
margin:30px auto;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.barra input{

width:420px;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
}

.barra select{

padding:14px;
border:none;
border-radius:8px;
font-size:16px;
}


.container{

width:90%;
max-width:1300px;
margin:auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:25px;

padding-bottom:50px;

}


.card{

background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.12);

transition:.4s;

}

.card:hover{

transform:translateY(-8px);

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}


.conteudo{

padding:20px;

}


.categoria{

display:inline-block;

background:#005bbb;
color:white;

padding:5px 12px;
border-radius:30px;

font-size:13px;
margin-bottom:12px;

}


.conteudo h2{

font-size:22px;
color:#002b5c;
margin-bottom:10px;

}


.data{

color:gray;
font-size:14px;
margin-bottom:15px;

}


.texto{

line-height:1.7;
color:#555;
margin-bottom:20px;

}


button{

background:#005bbb;
color:white;

padding:12px 20px;

border:none;
border-radius:8px;

cursor:pointer;

transition:.3s;

}


button:hover{

background:#003f82;

}


footer{

background:#002b5c;

color:white;

padding:25px;

text-align:center;

margin-top:40px;

}

</style>
</head>
<body>

<header>

<a href="index.html" class="btn-voltar">
⬅ Voltar ao Site Principal
</a>

<h1>📰 Publicações</h1>

<p>Empresa Júnior - CETEP Medeiros Neto</p>

</header>


<div style="text-align:center;margin:25px 0;">

<button onclick="abrirFormulario()" class="btn-publicar">
➕ Adicionar Notícia
</button>

</div>


<div id="formulario" style="display:none; max-width:700px; margin:20px auto; background:#fff; padding:20px; border-radius:10px;">

<input type="text" id="titulo" placeholder="Título da notícia" style="width:100%;padding:10px;">

<br><br>

<textarea id="texto" rows="6" placeholder="Escreva a notícia..." style="width:100%;padding:10px;"></textarea>

<br><br>

<input type="file" id="imagem">

<br><br>

<button onclick="publicarNoticia()">Publicar</button>

</div>


<div id="listaNoticias" class="container"></div>


<footer>

Empresa Júnior © 2026

</footer>
<script>

function abrirFormulario(){

    const formulario = document.getElementById("formulario");

    if(formulario.style.display === "block"){
        formulario.style.display = "none";
    }else{
        formulario.style.display = "block";
    }

}



function publicarNoticia(){

    const titulo = document.getElementById("titulo");
    const texto = document.getElementById("texto");
    const imagem = document.getElementById("imagem");
    const lista = document.getElementById("listaNoticias");


    if(titulo.value.trim() === "" || texto.value.trim() === ""){

        alert("Preencha o título e a notícia!");

        return;

    }


    const data = new Date().toLocaleDateString("pt-BR");


    function criarCard(imagemSrc){


        const card = document.createElement("div");

        card.className = "card";


        card.innerHTML = `

            <img src="${imagemSrc}" alt="Imagem da notícia">


            <div class="conteudo">

                <span class="categoria">
                    Notícia
                </span>


                <h2>
                    ${titulo.value}
                </h2>


                <div class="data">
                    ${data}
                </div>


                <p class="texto">
                    ${texto.value}
                </p>


            </div>

        `;


        lista.prepend(card);


        // limpar campos

        titulo.value = "";

        texto.value = "";

        imagem.value = "";


        // fechar formulário

        document.getElementById("formulario").style.display = "none";


        alert("Notícia publicada com sucesso!");

    }



    // Verifica se colocou imagem

    if(imagem.files.length > 0){


        const reader = new FileReader();


        reader.onload = function(e){

            criarCard(e.target.result);

        };


        reader.readAsDataURL(imagem.files[0]);


    }else{


        criarCard("https://via.placeholder.com/600x350?text=Sem+Imagem");


    }


}


</script>

</body>
</html>
