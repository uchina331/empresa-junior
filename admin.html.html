⬅ Voltar para Publicações

<h1>

🔐 Painel Administrativo

</h1>

<p>

Empresa Júnior - CETEP Medeiros Neto

<div class="container">
    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc,
updateDoc,
serverTimestamp,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyBs1WWlYtYGC18f6QyNJ2h4L-2d9xaHH3g",

authDomain:"empresa-junior-cetep.firebaseapp.com",

projectId:"empresa-junior-cetep",

storageBucket:"empresa-junior-cetep.firebasestorage.app",

messagingSenderId:"62973063152",

appId:"1:62973063152:web:bcea0e3d97d616fccf7735"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let noticiaEditando = null;

window.loginAdmin = async function(){

const email = document.getElementById("email").value;

const senha = document.getElementById("senha").value;

try{

await signInWithEmailAndPassword(auth,email,senha);

alert("Login realizado com sucesso!");

document.getElementById("loginAdmin").style.display="none";

}catch(e){

console.log(e.code);
console.log(e.message);

alert(e.message);

}

}

window.logout = async function(){

await signOut(auth);

}

onAuthStateChanged(auth,(user)=>{

document.getElementById("painelAdmin").style.display =
user ? "block" : "none";

document.getElementById("dashboardAdmin").style.display =
user ? "block" : "none";

document.getElementById("btnAdicionar").style.display =
user ? "inline-block" : "none";


if(user){



carregarNoticias();


}

});

window.abrirFormulario = function(){

const formulario = document.getElementById("formulario");

formulario.style.display =
formulario.style.display=="block"
? "none"
: "block";

}
async function enviarArquivoCloudinary(arquivo){

const formData = new FormData();

formData.append("file", arquivo);

formData.append(
"upload_preset",
"empresa-junior"
);


const tipo = arquivo.type.startsWith("video")
? "video"
: "image";


const resposta = await fetch(

`https://api.cloudinary.com/v1_1/akly4e4z/${tipo}/upload`,

{
method:"POST",
body:formData
}

);


const dados = await resposta.json();


if(!dados.secure_url){

console.log(dados);

throw new Error("Falha no upload da mídia");

}


return {

url:dados.secure_url,

tipo:tipo

};

}

window.publicarNoticia = async function(){

const titulo = document.getElementById("titulo").value;

const resumo = document.getElementById("resumo").value;

const texto = document.getElementById("texto").value;

const categoria = document.getElementById("categoria").value;

const autor = document.getElementById("autor").value;

const destaque = document.getElementById("destaque").checked;

const capa = document.getElementById("capa");

const arquivos = document.getElementById("arquivos");

if(titulo.trim()=="" || texto.trim()==""){

alert("Preencha o título e o texto.");

return;

}

let arquivoURL="";

let tipoArquivo="";

if(capa.files.length>0){

const upload = await enviarArquivoCloudinary(capa.files[0]);

arquivoURL = upload.url;

tipoArquivo = upload.tipo;

}

const anexos = [];


for(const arquivo of arquivos.files){


const upload = await enviarArquivoCloudinary(arquivo);


anexos.push({

nome: arquivo.name,

url: upload.url,

tipo: arquivo.type

});


}

const dados={

titulo,
resumo,
texto,
categoria,
autor,
destaque,

arquivo:arquivoURL,

tipo:tipoArquivo,

anexos,

visualizacoes:0,

data:serverTimestamp()

};

if(noticiaEditando){

await updateDoc(

doc(db,"noticias",noticiaEditando),

dados

);

alert("Notícia atualizada!");

noticiaEditando=null;

}else{

await addDoc(

collection(db,"noticias"),

dados

);

alert("Notícia publicada!");

document.querySelectorAll("#formulario input, #formulario textarea, #formulario select")
.forEach(campo=>{

if(campo.type === "checkbox"){

campo.checked = false;

}else{

campo.value = "";

}

});

document.getElementById("formulario").style.display = "none";

noticiaEditando = null;


}


}


function carregarNoticias(){

const q = query(
collection(db,"noticias"),
orderBy("data","desc")
);


onSnapshot(q,(consulta)=>{


const tbody = document.querySelector("#tabelaNoticias tbody");

tbody.innerHTML="";


let totalNoticias=0;
let totalViews=0;
let totalDestaques=0;
let totalArquivos=0;


consulta.forEach((documento)=>{


const noticia=documento.data();


totalNoticias++;

totalViews += noticia.visualizacoes || 0;


if(noticia.destaque){

totalDestaques++;

}


if(noticia.anexos){

totalArquivos += noticia.anexos.length;

}


const linha=document.createElement("tr");


linha.innerHTML=`


<td>${noticia.titulo}</td>


<td>${noticia.categoria || "-"}</td>


<td>${noticia.autor || "-"}</td>


<td>

${
noticia.data?.toDate
? noticia.data.toDate().toLocaleDateString("pt-BR")
: "-"
}

</td>


<td>${noticia.visualizacoes || 0}</td>


<td>


<button onclick="editarNoticia('${documento.id}')">

✏️

</button>


<button onclick="apagarNoticia('${documento.id}')">

🗑️

</button>


</td>


`;


tbody.appendChild(linha);


});


document.getElementById("totalNoticias").innerText=totalNoticias;

document.getElementById("totalViews").innerText=totalViews;

document.getElementById("totalDestaques").innerText=totalDestaques;

document.getElementById("totalArquivos").innerText=totalArquivos;


});


}

window.editarNoticia = async function(id){

const documento = await getDoc(doc(db,"noticias",id));

if(!documento.exists()) return;

const noticia = documento.data();

noticiaEditando = id;

document.getElementById("titulo").value = noticia.titulo;

document.getElementById("resumo").value = noticia.resumo || "";

document.getElementById("texto").value = noticia.texto;

document.getElementById("categoria").value = noticia.categoria;

document.getElementById("autor").value = noticia.autor;

document.getElementById("destaque").checked = noticia.destaque || false;

document.getElementById("formulario").style.display="block";

}

window.apagarNoticia = async function(id){

if(!confirm("Deseja realmente apagar esta notícia?")) return;

await deleteDoc(doc(db,"noticias",id));

alert("Notícia apagada com sucesso!");

carregarNoticias();

}
</script>
