<body>

<header>

⬅ Voltar ao Site Principal
</a>

<h1>📰 Publicações</h1>

<p>Empresa Júnior - CETEP Medeiros Neto</p>
<div style="position:absolute;top:20px;right:20px;">
    <button id="btnLogin" onclick="abrirLogin()">
        🔐 Login Admin
    </button>

    <button id="btnSair" onclick="logout()" style="display:none;">
        🚪 Sair
    </button>

<div style="text-align:center;margin:25px 0;">

<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc,
updateDoc,
serverTimestamp

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBs1WWlYtYGC18f6QyNJ2h4L-2d9xaHH3g",

authDomain: "empresa-junior-cetep.firebaseapp.com",

projectId: "empresa-junior-cetep",

storageBucket: "empresa-junior-cetep.firebasestorage.app",

messagingSenderId: "62973063152",

appId: "1:62973063152:web:bcea0e3d97d616fccf7735"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let noticiaEditando = null;

const auth = getAuth(app);

function atualizarBotoesAdmin() {

    const usuario = auth.currentUser;

    const btnAdicionar = document.getElementById("btnAdicionar");

    if(btnAdicionar){
        btnAdicionar.style.display = usuario ? "inline-block" : "none";
    }

    document.querySelectorAll("[data-admin]").forEach(botao=>{
        botao.style.display = usuario ? "inline-block" : "none";
    });

}


window.abrirLogin = function () {
    document.getElementById("loginAdmin").style.display = "flex";
}

window.fecharLogin = function () {
    document.getElementById("loginAdmin").style.display = "none";
}

window.loginAdmin = async function () {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    try {

        await signInWithEmailAndPassword(auth, email, senha);

        alert("Login realizado com sucesso!");

        fecharLogin();

    } catch (e) {

        alert("E-mail ou senha incorretos.");

    }

}

window.logout = async function () {

    await signOut(auth);

}

onAuthStateChanged(auth, (user) => {

if(user){

    document.getElementById("dashboardAdmin").style.display="block";

}else{

    document.getElementById("dashboardAdmin").style.display="none";

}

    const btnLogin = document.getElementById("btnLogin");
    const btnSair = document.getElementById("btnSair");

    if(user){

document.getElementById("painelAdmin").style.display="block";

        btnLogin.style.display = "none";
        btnSair.style.display = "inline-block";

    }else{

document.getElementById("painelAdmin").style.display="none";

        btnLogin.style.display = "inline-block";
        btnSair.style.display = "none";

    }

    atualizarBotoesAdmin();

});

window.abrirFormulario = function(){

const formulario = document.getElementById("formulario");


if(formulario.style.display === "block"){

formulario.style.display = "none";

}else{

formulario.style.display = "block";

}

}


async function enviarArquivo(arquivo){

    const formData = new FormData();

    formData.append("file",arquivo);

    formData.append("upload_preset","empresa-junior");

    let tipo="raw";

    if(arquivo.type.startsWith("image")) tipo="image";

    if(arquivo.type.startsWith("video")) tipo="video";

    const resposta = await fetch(

        `https://api.cloudinary.com/v1_1/akly4e4z/${tipo}/upload`,

        {

            method:"POST",

            body:formData

        }

    );

    const dados=await resposta.json();

    return{

        nome:arquivo.name,

        tipo:arquivo.type,

        url:dados.secure_url

    };

}

async function enviarArquivoCloudinary(arquivo){

    const formData = new FormData();

    formData.append("file", arquivo);
    formData.append("upload_preset", "empresa-junior");

    const tipo = arquivo.type.startsWith("video")
        ? "video"
        : "image";

    const resposta = await fetch(
        `https://api.cloudinary.com/v1_1/akly4e4z/${tipo}/upload`,
        {
            method:"POST",
            body:formData
        }
    );

    const dados = await resposta.json();

    return{
        url:dados.secure_url,
        tipo:tipo
    };

}

const inputArquivos = document.getElementById("arquivos");

inputArquivos.addEventListener("change", ()=>{

    const lista=document.getElementById("listaArquivos");

    lista.innerHTML="";

    Array.from(inputArquivos.files).forEach((arquivo)=>{

        lista.innerHTML += `
        <p>📎 ${arquivo.name}</p>
        `;

    });

});

window.editarNoticia = async function(id){

    const documento = await getDoc(doc(db,"noticias",id));

    if(!documento.exists()) return;

    const noticia = documento.data();

    noticiaEditando = id;

document.querySelector("#formulario button").innerText =
"💾 Salvar Alterações";

    document.getElementById("titulo").value = noticia.titulo;

    document.getElementById("resumo").value = noticia.resumo || "";

    document.getElementById("texto").value = noticia.texto;

    document.getElementById("categoria").value = noticia.categoria || "Notícia";

    document.getElementById("autor").value = noticia.autor || "Empresa Júnior";

    document.getElementById("destaque").checked = noticia.destaque || false;

    document.getElementById("formulario").style.display = "block";
}

window.publicarNoticia = async function(){

    const titulo = document.getElementById("titulo").value;
    const resumo = document.getElementById("resumo").value;
    const texto = document.getElementById("texto").value;

    const categoria = document.getElementById("categoria").value;
    const autor = document.getElementById("autor").value;
    const destaque = document.getElementById("destaque").checked;

    const capa = document.getElementById("capa");
    const arquivos = document.getElementById("arquivos");

    if(titulo.trim()==="" || texto.trim()===""){
        alert("Preencha o título e o texto da notícia!");
        return;
    }

    try{

        // Upload da imagem de capa
        let arquivoURL = "";
        let tipoArquivo = "";

        if(capa.files.length > 0){

            const upload = await enviarArquivoCloudinary(capa.files[0]);

            arquivoURL = upload.url;
            tipoArquivo = upload.tipo;

        }

        // Upload da galeria
const anexos = [];

for(const arquivo of arquivos.files){

    const upload = await enviarArquivoCloudinary(arquivo);

    anexos.push({

        nome: arquivo.name,

        url: upload.url,

        tipo: arquivo.type

    });

}

        if(noticiaEditando){

            await updateDoc(doc(db,"noticias",noticiaEditando),{

                titulo,
                resumo,
                texto,
                categoria,
                autor,
                destaque,
                arquivo: arquivoURL,
                tipo: tipoArquivo,
                anexos

            });

            noticiaEditando = null;

            alert("Notícia atualizada!");

        }else{

            await addDoc(collection(db,"noticias"),{

                titulo,
                resumo,
                texto,
                categoria,
                autor,
                destaque,
                arquivo: arquivoURL,
                tipo: tipoArquivo,
                anexos,
                visualizacoes:0,
                data: serverTimestamp()

            });

            alert("Notícia publicada!");

        }

        document.getElementById("titulo").value="";
        document.getElementById("resumo").value="";
        document.getElementById("texto").value="";
        document.getElementById("categoria").value="Notícia";
        document.getElementById("autor").value="Empresa Júnior";
        document.getElementById("destaque").checked=false;
        document.getElementById("capa").value="";
        document.getElementById("arquivos").value="";
        document.getElementById("listaArquivos").innerHTML="";

        document.getElementById("formulario").style.display="none";

document.querySelector("#formulario button").innerText = "🚀 Publicar";
      carregarNoticias();

 

    }catch(error){

        console.error(error);

        alert("Erro ao publicar a notícia.");

    }

}


window.apagarNoticia = async function(id){

    try{

        const confirmar = confirm("Deseja realmente apagar esta notícia?");

        if(!confirmar) return;

        await deleteDoc(doc(db, "noticias", id));

        alert("Notícia apagada com sucesso!");

        await carregarNoticias();

    }catch(error){

        console.error(error);

        alert("Erro ao apagar a notícia.");


    }

}
async function carregarNoticias(){


const lista = document.getElementById("listaNoticias");


lista.innerHTML="";

const corpoTabela = document.querySelector("#tabelaNoticias tbody");

corpoTabela.innerHTML="";

const consulta = await getDocs(collection(db,"noticias"));

let totalNoticias = 0;
let totalViews = 0;
let totalDestaques = 0;
let totalArquivos = 0;

consulta.forEach((documento)=>{

    const noticia = documento.data();

    totalNoticias++;

    totalViews += noticia.visualizacoes || 0;

    if(noticia.destaque){
        totalDestaques++;
    }

    if(noticia.anexos){
        totalArquivos += noticia.anexos.length;
    }

});


document.getElementById("totalNoticias").innerText = totalNoticias;
document.getElementById("totalViews").innerText = totalViews;
document.getElementById("totalDestaques").innerText = totalDestaques;
document.getElementById("totalArquivos").innerText = totalArquivos;

consulta.forEach((documento)=>{

const noticia = documento.data();

const card = document.createElement("div");

card.className = "card";

card.style.cursor = "pointer";

card.onclick = () => {

    window.location.href = `noticia.html?id=${documento.id}`;

};

card.innerHTML=`

${noticia.tipo === "image"
? `
<img src="${noticia.arquivo}" alt="Imagem da notícia">
`
: noticia.tipo === "video"
? `
<video controls class="video-noticia">
    <source src="${noticia.arquivo}">
</video>
`
: ""}


<div class="conteudo">

<span class="categoria">
Notícia
</span>


<h2>
${noticia.titulo}
</h2>


<p class="texto">
${noticia.texto}
</p>

<button
onclick="event.stopPropagation(); window.location.href='noticia.html?id=${documento.id}'">
📖 Ler matéria completa
</button>

<button
data-admin
style="display:none;"
onclick="event.stopPropagation(); window.editarNoticia('${documento.id}')">
✏️ Editar
</button>

<button
data-admin
style="display:none;"
onclick="event.stopPropagation(); window.apagarNoticia('${documento.id}')">
🗑️ Apagar
</button>


</div>

`;

lista.appendChild(card);

});

atualizarBotoesAdmin();

}

document.getElementById("pesquisaAdmin").addEventListener("keyup", function(){

    const texto = this.value.toLowerCase();

    document.querySelectorAll("#tabelaNoticias tbody tr").forEach(linha=>{

        linha.style.display =
            linha.innerText.toLowerCase().includes(texto)
            ? ""
            : "none";

    });

});


carregarNoticias();


</script>
