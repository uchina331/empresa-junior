<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Publicações | Empresa Júnior</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef3f8;
}

/* ========================= */

header{

    background:#002b5c;
    color:white;
    text-align:center;
    padding:30px;

}

header h1{

    font-size:38px;
    margin-bottom:10px;

}

header p{

    opacity:.9;

}

/* ========================= */

.btn-voltar{

    display:inline-block;
    margin-bottom:25px;

    padding:12px 25px;

    background:white;
    color:#002b5c;

    text-decoration:none;

    border-radius:10px;

    font-weight:600;

    transition:.3s;

}

.btn-voltar:hover{

    background:#FFD54F;

}

/* ========================= */

.barra{

    width:90%;
    max-width:900px;

    margin:35px auto;

    display:flex;
    justify-content:center;

}

.barra input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    font-size:16px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

}

/* ========================= */

.container{

    width:90%;
    max-width:1300px;

    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:25px;

    padding-bottom:60px;

}

/* ========================= */

.card{

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 10px 20px rgba(0,0,0,.12);

    transition:.35s;

    cursor:pointer;

}

.card:hover{

    transform:translateY(-8px);

}

.card img{

    width:100%;
    height:220px;

    object-fit:cover;

}

.video-noticia{

    width:100%;
    height:220px;

    object-fit:cover;

    background:black;

}

.conteudo{

    padding:20px;

}

.categoria{

    display:inline-block;

    background:#005bbb;

    color:white;

    padding:6px 14px;

    border-radius:30px;

    font-size:13px;

    margin-bottom:15px;

}

.conteudo h2{

    color:#002b5c;

    margin-bottom:10px;

}

.data{

    color:#777;

    font-size:14px;

    margin-bottom:15px;

}

.texto{

    color:#555;

    line-height:1.7;

    margin-bottom:20px;

}

.btn-ler{

    width:100%;

    padding:13px;

    background:#005bbb;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    transition:.3s;

}

.btn-ler:hover{

    background:#003f82;

}

/* ========================= */

footer{

    background:#002b5c;

    color:white;

    text-align:center;

    padding:25px;

    margin-top:40px;

}

</style>

</head>

<body>

<header>

<a href="index.html" class="btn-voltar">

⬅ Voltar ao Site Principal

</a>

<h1>📰 Publicações</h1>

<p>
Notícias, eventos e projetos da Empresa Júnior
</p>

</header>

<div class="barra">

<input
type="text"
id="pesquisa"
placeholder="Pesquisar notícia...">

</div>

<div
id="listaNoticias"
class="container">

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyBs1WWlYtYGC18f6QyNJ2h4L-2d9xaHH3g",

    authDomain: "empresa-junior-cetep.firebaseapp.com",

    projectId: "empresa-junior-cetep",

    storageBucket: "empresa-junior-cetep.firebasestorage.app",

    messagingSenderId: "62973063152",

    appId: "1:62973063152:web:bcea0e3d97d616fccf7735"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let carregandoNoticias = false;

async function carregarNoticias(){


if(carregandoNoticias) return;

carregandoNoticias = true;

const lista = document.getElementById("listaNoticias");

lista.innerHTML = "";

const consulta = await getDocs(collection(db, "noticias"));

const noticias = [];

consulta.forEach((documento) => {

    noticias.push({
        id: documento.id,
        ...documento.data()
    });

});

noticias.sort((a, b) => {

    if (!a.data || !b.data) return 0;

    return b.data.seconds - a.data.seconds;

});

if (noticias.length === 0) {

    lista.innerHTML = `
        <div style="
            grid-column:1/-1;
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        ">
            <h2>Nenhuma notícia publicada.</h2>
            <p>Assim que uma notícia for publicada ela aparecerá aqui.</p>
        </div>
    `;

    return;

}

noticias.forEach((noticia)=>{


const card = document.createElement("div");

card.className = "card";

card.onclick = ()=>{

window.location.href =
`noticia.html?id=${noticia.id}`;

};
        let midia = "";

        if(noticia.tipo === "image"){

            midia = `
            <img src="${noticia.arquivo}">
            `;

        }

        else if(noticia.tipo === "video"){

            midia = `
            <video controls class="video-noticia">
                <source src="${noticia.arquivo}">
            </video>
            `;

        }

        const data =
        noticia.data?.toDate
        ? noticia.data.toDate().toLocaleDateString("pt-BR")
        : "";

        card.innerHTML = `

            ${midia}

            <div class="conteudo">

                <span class="categoria">

                    ${noticia.categoria || "Notícia"}

                </span>

                <h2>

                    ${noticia.titulo}

                </h2>

                <p class="data">

                    ${data}

                </p>

                <p class="texto">

                    ${(noticia.resumo || noticia.texto).substring(0,180)}...

                </p>

                <button
                class="btn-ler"
                onclick="event.stopPropagation();window.location.href='noticia.html?id=${noticia.id}'

                    📖 Ler matéria completa

                </button>

            </div>

        `;

        lista.appendChild(card);

    });

carregandoNoticias = false;

}

carregarNoticias();
document.getElementById("pesquisa").addEventListener("keyup", function () {

    const texto = this.value.toLowerCase();

    document.querySelectorAll(".card").forEach((card) => {

        card.style.display = card.innerText
            .toLowerCase()
            .includes(texto)
            ? ""
            : "none";

    });

});



// Atualiza automaticamente as notícias a cada 30 segundos
setInterval(() => {
    carregarNoticias();
}, 30000);

// Atualiza quando a aba voltar a ficar ativa
document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
        carregarNoticias();
    }
});

// Atualiza ao voltar para esta página
window.addEventListener("focus", () => {
    carregarNoticias();
});

</script>


<footer>

Empresa Júnior © 2026

</footer>

</body>

</html>
