<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícia | Empresa Júnior</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3f8;
color:#333;
}

header{

background:#002b5c;
color:white;
padding:25px;
text-align:center;

}

.btn-voltar{

display:inline-block;
margin-bottom:20px;
padding:12px 20px;

background:white;
color:#002b5c;

text-decoration:none;

border-radius:10px;

font-weight:bold;

transition:.3s;

}

.btn-voltar:hover{

background:#FFD54F;

}

main{

max-width:1000px;

margin:40px auto;

background:white;

padding:35px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

h1{

color:#002b5c;

margin-bottom:15px;

font-size:38px;

}

#categoria{

display:inline-block;

background:#005bbb;

color:white;

padding:6px 15px;

border-radius:30px;

font-size:14px;

margin-bottom:15px;

}

#data{

color:gray;

margin-bottom:20px;

}

#autor{

font-weight:bold;

margin-bottom:30px;

}

#capa{

width:100%;

border-radius:15px;

margin-bottom:30px;

object-fit:cover;

max-height:500px;

}

#texto{

font-size:18px;

line-height:1.9;

white-space:pre-line;

margin-bottom:40px;

}

.galeria{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:30px;

}

.galeria img{

width:100%;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

.galeria img:hover{

transform:scale(1.03);

}

.galeria video{

width:100%;

border-radius:12px;

}

footer{

background:#002b5c;

color:white;

text-align:center;

padding:25px;

margin-top:50px;

}

</style>

</head>

<body>

<header>

<a href="publicacoes.html" class="btn-voltar">

⬅ Voltar para Publicações

</a>

<h2>Empresa Júnior</h2>

</header>

<main>

<span id="categoria"></span>

<h1 id="titulo"></h1>

<p id="data"></p>

<p id="autor"></p>

<img id="capa" style="display:none;">

<div id="videoCapa"></div>

<div id="texto"></div>

<h2 style="margin-top:40px;color:#002b5c;">

📂 Galeria

</h2>

<div class="galeria" id="galeria"></div>

</main>

<footer>

Empresa Júnior © 2026

</footer>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "SUA_API_KEY",

authDomain: "empresa-junior-cetep.firebaseapp.com",

projectId: "empresa-junior-cetep",

storageBucket: "empresa-junior-cetep.firebasestorage.app",

messagingSenderId: "62973063152",

appId: "1:62973063152:web:bcea0e3d97d616fccf7735"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const parametros = new URLSearchParams(window.location.search);

const id = parametros.get("id");

if(!id){

document.body.innerHTML="<h1 style='text-align:center;margin-top:80px;'>Notícia não encontrada.</h1>";

throw new Error("ID não informado.");

}

const referencia = doc(db,"noticias",id);

const documento = await getDoc(referencia);

if(!documento.exists()){

document.body.innerHTML="<h1 style='text-align:center;margin-top:80px;'>Notícia não encontrada.</h1>";

throw new Error("Documento inexistente.");

}

await updateDoc(referencia,{

visualizacoes:increment(1)

});

const noticia = documento.data();

document.getElementById("titulo").innerText = noticia.titulo;

document.getElementById("categoria").innerText = noticia.categoria || "Notícia";

document.getElementById("autor").innerText =
"Autor: " + (noticia.autor || "Empresa Júnior");

document.getElementById("data").innerText =
"Publicado em: " +
(noticia.data?.toDate().toLocaleDateString("pt-BR") || "");

document.getElementById("texto").innerText =
noticia.texto || "";
if(noticia.tipo === "image" && noticia.arquivo){

const capa = document.getElementById("capa");

capa.src = noticia.arquivo;

capa.style.display = "block";

}

if(noticia.tipo === "video" && noticia.arquivo){

document.getElementById("videoCapa").innerHTML = `

<video controls style="width:100%;border-radius:15px;margin-bottom:30px;">

<source src="${noticia.arquivo}">

</video>

`;

}

const galeria = document.getElementById("galeria");

if(noticia.anexos){

noticia.anexos.forEach((arquivo)=>{

if(arquivo.tipo.startsWith("image")){

galeria.innerHTML += `

<img
src="${arquivo.url}"
alt="${arquivo.nome}"
onclick="window.open('${arquivo.url}','_blank')">

`;

}

else if(arquivo.tipo.startsWith("video")){

galeria.innerHTML += `

<video controls>

<source src="${arquivo.url}">

</video>

`;

}

else{

galeria.innerHTML += `

<p>

<a
href="${arquivo.url}"
target="_blank">

📄 ${arquivo.nome}

</a>

</p>

`;

}

});

}

</script>

</body>

</html>
